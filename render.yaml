services:
  - type: web
    name: invoiceflow-pro
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATA_DIR
        value: /var/data
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_STAFF_PASSWORD
        sync: false
    disk:
      name: invoiceflow-data
      mountPath: /var/data
      sizeGB: 1
