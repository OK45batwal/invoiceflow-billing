services:
  - type: web
    name: invoiceflow-pro
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: STORAGE_DRIVER
        value: json
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      # ── Email via Brevo HTTP API (replaces SMTP — Render free tier blocks SMTP) ──
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_FROM_NAME
        sync: false
      - key: DEFAULT_OTP_ROLE
        sync: false
      - key: OTP_APP_NAME
        sync: false
