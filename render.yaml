services:
  - type: web
    name: invoiceflow-pro
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_STAFF_PASSWORD
        sync: false
