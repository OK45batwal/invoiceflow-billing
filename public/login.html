<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InvoiceFlow Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div id="login-root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="/src/Login.js"></script>
    <script>
        window.renderBillingLogin(document.getElementById("login-root"), {
            appName: "InvoiceFlow Pro",
            heading: "Welcome back",
            subheading: "Enter your email to receive a one-time password and access your workspace.",
            onAuthenticated: async function (response) {
                localStorage.setItem("billing_token", response.token);
                window.location.href = "/";
            }
        });
    </script>
</body>

</html>
